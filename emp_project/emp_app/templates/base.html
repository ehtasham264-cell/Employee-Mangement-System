<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <title>{% block title %}Employee Management System{% endblock %}</title>
  <style>
    body { background-color: #f0f2f5; }
    .navbar { background: linear-gradient(135deg, #1a237e, #283593); }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 0.5px; }
    .nav-link { font-weight: 500; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
    .btn { border-radius: 8px; font-weight: 500; }
    .table thead th { background-color: #1a237e; color: white; border: none; }
    .table tbody tr:hover { background-color: #e8eaf6; }
    .badge-dept { background-color: #e3f2fd; color: #1565c0; padding: 4px 10px; border-radius: 20px; font-size: 0.82rem; }
    .badge-role { background-color: #f3e5f5; color: #6a1b9a; padding: 4px 10px; border-radius: 20px; font-size: 0.82rem; }
    .page-header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .stat-card { border-left: 4px solid; }
    .stat-card.blue { border-color: #1a237e; }
    .stat-card.green { border-color: #2e7d32; }
    .stat-card.purple { border-color: #6a1b9a; }
    .alert { border-radius: 10px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <a class="navbar-brand" href="/"><i class="fas fa-users-cog mr-2"></i>EMS</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home mr-1"></i>Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/all_emp"><i class="fas fa-list mr-1"></i>All Employees</a></li>
      <li class="nav-item"><a class="nav-link" href="/add_emp"><i class="fas fa-user-plus mr-1"></i>Add Employee</a></li>
      <li class="nav-item"><a class="nav-link" href="/filter_emp"><i class="fas fa-filter mr-1"></i>Filter</a></li>
      <li class="nav-item"><a class="nav-link" href="/remove_emp"><i class="fas fa-user-minus mr-1"></i>Remove</a></li>
      <li class="nav-item">
        <form method="post" action="/accounts/logout/" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-light btn-sm ml-2" style="border-radius:8px;font-weight:500;">
            <i class="fas fa-sign-out-alt mr-1"></i>Logout
          </button>
        </form>
      </li>
    </ul>
  </div>
</nav>

<div class="container">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
